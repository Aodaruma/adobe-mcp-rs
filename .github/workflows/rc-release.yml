name: RC Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-tag-source:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag ${GITHUB_REF_NAME} is not based on origin/main. Release steps will be skipped."
          fi

  windows-rc:
    needs: verify-tag-source
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' }}
    runs-on: windows-latest
    outputs:
      signing_mode: ${{ steps.signing.outputs.mode }}
    env:
      WIN_SIGN_PFX_BASE64: ${{ secrets.WIN_SIGN_PFX_BASE64 }}
      WIN_SIGN_PFX_PASSWORD: ${{ secrets.WIN_SIGN_PFX_PASSWORD }}
      WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Select Windows signing mode
        id: signing
        shell: pwsh
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:WIN_SIGN_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WIN_SIGN_PFX_PASSWORD)
          if ($hasPfx -and $hasPassword) {
            "mode=signed" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif (-not $hasPfx -and -not $hasPassword) {
            "mode=unsigned" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning "Building explicit unsigned Windows release artifacts."
          } else {
            Write-Error "Windows signing secrets are only partially configured. Set both WIN_SIGN_PFX_BASE64 and WIN_SIGN_PFX_PASSWORD, or leave both empty."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows installer artifacts
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -OutputDir .\dist\windows -RequireMsi

      - name: Decode signing certificate
        if: ${{ steps.signing.outputs.mode == 'signed' }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("$env:WIN_SIGN_PFX_BASE64")
          $path = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          "WIN_SIGN_PFX_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows artifacts
        if: ${{ steps.signing.outputs.mode == 'signed' }}
        shell: pwsh
        run: |
          $timestamp = if ($env:WIN_SIGN_TIMESTAMP_URL) { $env:WIN_SIGN_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          .\scripts\sign-windows.ps1 -ArtifactDir .\dist\windows -PfxPath $env:WIN_SIGN_PFX_PATH -PfxPassword $env:WIN_SIGN_PFX_PASSWORD -TimestampUrl $timestamp

      - name: Label unsigned Windows artifacts
        if: ${{ steps.signing.outputs.mode == 'unsigned' }}
        shell: pwsh
        run: |
          $renames = @{
            ".\dist\windows\adobe-mcp-rs-windows-x86_64.zip" = ".\dist\windows\adobe-mcp-rs-windows-x86_64-unsigned.zip"
            ".\dist\windows\adobe-mcp-rs-windows-x86_64.msi" = ".\dist\windows\adobe-mcp-rs-windows-x86_64-unsigned.msi"
          }
          foreach ($entry in $renames.GetEnumerator()) {
            if (-not (Test-Path -LiteralPath $entry.Key)) {
              throw "Unsigned Windows artifact not found: $($entry.Key)"
            }
            Move-Item -LiteralPath $entry.Key -Destination $entry.Value
          }

      - name: Upload Windows RC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-rc-artifacts
          path: dist/windows/*

  macos-rc:
    needs: verify-tag-source
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' }}
    runs-on: macos-14
    outputs:
      signing_mode: ${{ steps.signing.outputs.mode }}
    env:
      MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
      MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
      MAC_APPLICATION_IDENTITY: ${{ secrets.MAC_APPLICATION_IDENTITY }}
      MAC_INSTALLER_IDENTITY: ${{ secrets.MAC_INSTALLER_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Select macOS signing mode
        id: signing
        run: |
          if [[ -n "$MAC_CERT_P12_BASE64" && -n "$MAC_CERT_PASSWORD" && \
                -n "$MAC_APPLICATION_IDENTITY" && -n "$MAC_INSTALLER_IDENTITY" && \
                -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && \
                -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
          elif [[ -z "$MAC_CERT_P12_BASE64" && -z "$MAC_CERT_PASSWORD" && \
                  -z "$MAC_APPLICATION_IDENTITY" && -z "$MAC_INSTALLER_IDENTITY" && \
                  -z "$APPLE_ID" && -z "$APPLE_TEAM_ID" && \
                  -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::warning::Building explicit unsigned macOS release artifacts."
          else
            echo "::error::macOS signing and notarization secrets are only partially configured. Set all required secrets, or leave all of them empty."
            exit 1
          fi

      - name: Import Apple certificate
        if: ${{ steps.signing.outputs.mode == 'release' }}
        run: |
          KEYCHAIN_PASS="${MAC_KEYCHAIN_PASSWORD:-temp-pass}"
          CERT_PATH="$RUNNER_TEMP/macos-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Build macOS installer artifacts
        run: |
          chmod +x ./scripts/package-macos.sh ./scripts/notarize-macos.sh
          MACOS_SIGNING_MODE="${{ steps.signing.outputs.mode }}" \
            REQUIRE_PKG=true \
            ./scripts/package-macos.sh ./dist/macos

      - name: Notarize macOS product package
        if: ${{ steps.signing.outputs.mode == 'release' }}
        run: |
          ./scripts/notarize-macos.sh ./dist/macos

      - name: Label unsigned macOS artifacts
        if: ${{ steps.signing.outputs.mode == 'unsigned' }}
        run: |
          mv \
            ./dist/macos/adobe-mcp-rs-macos-universal.pkg \
            ./dist/macos/adobe-mcp-rs-macos-universal-unsigned.pkg
          mv \
            ./dist/macos/adobe-mcp-rs-macos-universal.tar.gz \
            ./dist/macos/adobe-mcp-rs-macos-universal-unsigned.tar.gz

      - name: Upload macOS RC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-rc-artifacts
          path: dist/macos/*

  create-release:
    needs:
      - verify-tag-source
      - windows-rc
      - macos-rc
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-rc-artifacts
          path: dist/release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-rc-artifacts
          path: dist/release/macos

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          WINDOWS_SIGNING_MODE: ${{ needs.windows-rc.outputs.signing_mode }}
          MACOS_SIGNING_MODE: ${{ needs.macos-rc.outputs.signing_mode }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"

          # Collect only distributable artifacts (exclude intermediate files like stage/pkgroot).
          mapfile -t files < <(
            find dist/release/windows dist/release/macos -maxdepth 1 -type f \
              \( -name "*.zip" -o -name "*.msi" -o -name "*.pkg" -o -name "*.tar.gz" -o -name "*.dmg" \) \
              | sort
          )
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release artifacts were found."
            exit 1
          fi

          printf "Release assets:\n"
          printf "  - %s\n" "${files[@]}"

          notes_file="$RUNNER_TEMP/release-notes.md"
          : > "$notes_file"
          if [[ "$WINDOWS_SIGNING_MODE" == "unsigned" || "$MACOS_SIGNING_MODE" == "unsigned" ]]; then
            cat >> "$notes_file" <<'EOF'
          <!-- unsigned-artifacts-warning -->
          > [!WARNING]
          > **Unsigned release artifacts:** Files with `-unsigned` in their name are not trusted-distribution artifacts.

          EOF
            if [[ "$MACOS_SIGNING_MODE" == "unsigned" ]]; then
              echo '> macOS packages are not Developer ID signed or notarized, so Gatekeeper may warn or block them.' >> "$notes_file"
            fi
            if [[ "$WINDOWS_SIGNING_MODE" == "unsigned" ]]; then
              echo '> Windows packages are not Authenticode-signed, so Microsoft Defender SmartScreen may warn or block them.' >> "$notes_file"
            fi
            echo '> Use these files only if you understand and accept that limitation, or build from source. Trusted signed/notarized distribution remains tracked in #31.' >> "$notes_file"
            echo >> "$notes_file"
          fi

          if generated_notes="$(gh api --method POST "repos/$repo/releases/generate-notes" -f tag_name="$tag" --jq '.body')"; then
            printf '%s\n' "$generated_notes" >> "$notes_file"
          else
            echo "::warning::GitHub release-note generation failed; using the explicit release warning only."
            printf 'Release %s.\n' "$tag" >> "$notes_file"
          fi

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$repo" --title "$tag" --notes-file "$notes_file"
            gh release upload "$tag" "${files[@]}" --clobber --repo "$repo"
          else
            create_args=(release create "$tag" "${files[@]}" --repo "$repo" --verify-tag --title "$tag" --notes-file "$notes_file")
            if [[ "$tag" == *"-rc"* ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi
